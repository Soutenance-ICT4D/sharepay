name: Deploy Sharepay Frontend

on:
  push:
    branches:
      - prod

jobs:
  deploy-sharepay-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy Sharepay Frontend to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/apps/sharepay/frontend
            git pull origin prod
            docker compose down
            docker compose up -d --build
            echo "✅ Sharepay Frontend déployé avec succès !"
